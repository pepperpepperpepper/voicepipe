Name: Zwangli
Summary: Voice-driven Android client for a voicepipe dispatch server.
Description: |
  Zwangli is the Android sibling of desktop Zwingli — a thin Kotlin
  client that POSTs a transcript to a voicepipe dispatch server and
  acts on the response in your focused app.

  - Thin client to a self-hosted voicepipe dispatch server; all
    transcript-trigger logic lives server-side, the phone just
    speaks and acts.
  - On-device speech recognition (Android's SpeechRecognizer) drives
    a mic button with live partial results and auto-submit on final
    transcript.
  - Accessibility service types the dispatch response straight into
    whatever app currently has focus — no copy/paste shuffle.
  - Persistent dictation notification with a "Dictate" quick-action
    so you can start a recording without first opening the app;
    optional auto-start on boot.
  - Executes the server's queued client_actions[]: clipboard writes
    via ClipboardManager, audio feedback via short bundled tones.
    Capabilities ["clipboard", "audio_feedback"] are advertised in
    every request so the server degrades gracefully on older
    clients.
