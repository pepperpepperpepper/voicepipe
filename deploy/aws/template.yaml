AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Zwingli/Zwangli dispatch backend — container-image Lambda behind a Function
  URL, kept warm by an EventBridge ping. Auth is the app-level bearer token
  (VOICEPIPE_DISPATCH_TOKEN); the Function URL is AuthType NONE so the
  Authorization header reaches the app.

Parameters:
  DispatchToken:
    Type: String
    NoEcho: true
    Description: "Bearer token clients send as: Authorization: Bearer <token>"
  GroqApiKey:
    Type: String
    NoEcho: true
    Description: Groq API key (Groq Whisper STT + LLM router).
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: OpenAI API key (optional; only if STT/LLM is repointed to OpenAI).
  SttModel:
    Type: String
    Default: "groq:whisper-large-v3-turbo"
    Description: VOICEPIPE_DISPATCH_STT_MODEL for /transcribe-dispatch.
  RouterModel:
    Type: String
    Default: "llama-3.3-70b-versatile"
    Description: "LLM intent-router model (VOICEPIPE_ZWINGLI_MODEL) for llm_route. The codebase default kimi-k2 is no longer available on Groq."
  GoogleOauthClientId:
    Type: String
    Default: ""
    Description: "Google OAuth Web client ID (GOOGLE_OAUTH_CLIENT_ID) = the verified ID-token audience. Empty disables Google Sign-In."
  AllowedEmail:
    Type: String
    Default: "peppersclothescult@gmail.com,ron@blonderon.com,fenlonorama@gmail.com"
    Description: "Comma-separated allowlist of verified Google emails (ZWANGLI_ALLOWED_EMAIL). Empty rejects all Google identities."
  AllowStaticToken:
    Type: String
    Default: "1"
    Description: "ZWANGLI_ALLOW_STATIC_TOKEN: 1 keeps the legacy bearer as break-glass during cutover. Set to empty for Google-only once sign-in is verified."
  KeepWarmRate:
    Type: String
    Default: "rate(5 minutes)"
    Description: EventBridge schedule expression for the keep-warm ping.

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Resources:
  DispatchFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: deploy/aws/Dockerfile
      DockerContext: ../..
      DockerTag: zwangli-dispatch
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Environment:
        Variables:
          VOICEPIPE_DISPATCH_TOKEN: !Ref DispatchToken
          GROQ_API_KEY: !Ref GroqApiKey
          OPENAI_API_KEY: !Ref OpenAiApiKey
          VOICEPIPE_DISPATCH_STT_MODEL: !Ref SttModel
          VOICEPIPE_ZWINGLI_MODEL: !Ref RouterModel
          GOOGLE_OAUTH_CLIENT_ID: !Ref GoogleOauthClientId
          ZWANGLI_ALLOWED_EMAIL: !Ref AllowedEmail
          ZWANGLI_ALLOW_STATIC_TOKEN: !Ref AllowStaticToken
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        KeepWarm:
          Type: Schedule
          Properties:
            Schedule: !Ref KeepWarmRate
            Input: '{"warmer": true}'

Outputs:
  FunctionUrl:
    Description: Public HTTPS endpoint — set this as the Zwangli server URL.
    Value: !GetAtt DispatchFunctionUrl.FunctionUrl
  FunctionName:
    Description: Lambda function name (for logs / manual invoke).
    Value: !Ref DispatchFunction
